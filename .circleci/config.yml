version: 2.1

orbs:
  prodsec: snyk/prodsec-orb@1

jobs:
  security-scans:
    parameters:
      node_version:
        type: string
    working_directory: ~/code-sdk
    docker:
      - image: cimg/node:<< parameters.node_version >>
    steps:
      - checkout
      - restore_cache:
          keys:
            - v2-{{ .Branch }}-{{ .Revision }}-<< parameters.node_version >>
      - run:
          name: Install
          command: npm install
      - prodsec/security_scans:
          mode: auto
          release-branch: master
          iac-scan: disabled

  test:
    parameters:
      node_version:
        type: string
      package-lock:
        type: string
    working_directory: ~/code-sdk
    docker:
      - image: cimg/node:<< parameters.node_version >>
    steps:
      - checkout
      - restore_cache:
          keys:
            - v2-{{ .Branch }}-{{ .Revision }}-<< parameters.node_version >>>-<< parameters.package-lock >>>
      - when:
          condition: << parameters.package-lock >> == "locked-dependencies"
          steps:
            - run:
                name: Install
                command: npm install
      - unless:
          condition: << parameters.package-lock >>
          steps:
            - run:
                name: Install without locked dependencies
                command: npm install --no-package-lock
      - save_cache:
          key: v2-{{ .Branch }}-{{ .Revision }}-<< parameters.node_version >>-<< parameters.package-lock >>>
          paths:
            - node_modules
      - run: npm run test

  lint:
    parameters:
      node_version:
        type: string
    working_directory: ~/code-sdk
    docker:
      - image: cimg/node:<< parameters.node_version >>
    steps:
      - checkout
      - restore_cache:
          keys:
            - v2-{{ .Branch }}-{{ .Revision }}-<< parameters.node_version >>
      - run:
          name: Install
          command: npm install
      - run: npm run lint

  release:
    parameters:
      node_version:
        type: string
    working_directory: ~/code-sdk
    docker:
      - image: cimg/node:<< parameters.node_version >>
    steps:
      - checkout
      - restore_cache:
          keys:
            - v2-{{ .Branch }}-{{ .Revision }}-<< parameters.node_version >>
      - run:
          name: Install
          command: npm install
      - run:
          name: Publish to GitHub
          command: npx semantic-release

workflows:
  default_workflow:
    jobs:
      - prodsec/secrets-scan:
          context:
            - snyk-bot-slack
          channel: snyk-on-snyk-codesec_code-integrations
          filters:
            branches:
              ignore:
                - master
      - security-scans:
          node_version: '20.19.2'
          name: Security Scans
          context:
            - prodsec-orb-runtime
            - codesec_code-integrations
      - lint:
          node_version: '20.19.2'
      - test:
          matrix:
            parameters:
              node_version: ['18.20.8', '20.19.2']
              package-lock: ['locked-dependencies', 'no-package-lock']
          context:
            - nodejs-install
            - code-client-integration-test
          requires:
            - lint
      - release:
          node_version: '20.19.2'
          context: nodejs-lib-release
          requires:
            - lint
          filters:
            branches:
              only:
                - master
